<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ConvoShield AI</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="header">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            ConvoShield <span class="badge">AI</span>
        </div>
    </div>

    <div id="main-view" class="view hidden">
        <div class="status-box" id="whatsapp-status">
            Waiting for WhatsApp Web...
        </div>
        <button id="scan-btn" class="btn primary disabled">
            Scan Current Chat
        </button>
    </div>

    <div id="loading-view" class="view hidden">
        <div class="spinner"></div>
        <p>Scanning conversation for threats...</p>
    </div>

    <div id="result-view" class="view hidden">
        <div class="risk-gauge" id="risk-gauge">
            <div class="score" id="risk-score">0</div>
            <div class="level" id="risk-level">LOW RISK</div>
        </div>

        <div class="summary" id="analysis-summary"></div>

        <h4>Flagged Phrases</h4>
        <ul id="flagged-list" class="flagged-list"></ul>

        <h4>Safety Advice</h4>
        <ul id="advice-list" class="advice-list"></ul>

        <button id="back-btn" class="btn secondary">Back to Scanner</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
